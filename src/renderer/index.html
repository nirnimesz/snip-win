<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file:; connect-src 'self';">
  <title>SnipWin — Visual Review</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="app-title">Snip<span class="accent">Win</span></h1>
        <span class="app-version">v2.0</span>
      </div>
      <div class="header-right">
        <button id="btnCaptureScreen" class="btn btn-icon" title="Capture Full Screen (Ctrl+Shift+1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <button id="btnCaptureWindow" class="btn btn-icon" title="Capture Window (Ctrl+Shift+2)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
        </button>
        <button id="btnSettings" class="btn btn-icon" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="review">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Review
      </button>
      <button class="tab-btn" data-tab="gallery">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Gallery
        <span id="galleryCount" class="tab-badge hidden">0</span>
      </button>
    </div>

    <!-- Review Panel -->
    <div id="reviewPanel" class="review-panel">
      <div id="reviewEmpty" class="review-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <h3>Waiting for review request</h3>
        <p>Use the CLI or an AI agent to send content for review</p>
        <div class="quick-actions">
          <button id="btnQuickCapture" class="btn btn-outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Capture Screen
          </button>
        </div>
      </div>

      <div id="reviewActive" class="review-active hidden">
        <div id="reviewMessage" class="review-message"></div>
        <div id="reviewContent" class="review-content"></div>
        <div id="canvasContainer" class="canvas-container">
          <canvas id="annotationCanvas"></canvas>
        </div>
        <div id="annotationToolbar" class="annotation-toolbar">
          <button class="tool-btn active" data-tool="select" title="Select (V)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
          </button>
          <button class="tool-btn" data-tool="text" title="Text (T)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </button>
          <button class="tool-btn" data-tool="blur" title="Blur (B)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 0 20" opacity="0.5"/><path d="M12 6a6 6 0 0 1 0 12" opacity="0.7"/></svg>
          </button>
          <button class="tool-btn" data-tool="freehand" title="Freehand (F)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17c3-3 6-6 9-3s6 6 9 3"/></svg>
          </button>
          <div class="toolbar-divider"></div>
          <button id="btnUndo" class="tool-btn" title="Undo (Ctrl+Z)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <button id="btnClear" class="tool-btn" title="Clear All">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
        <div class="review-actions">
          <textarea id="reviewText" class="review-text" placeholder="Add your feedback..."></textarea>
          <div class="action-buttons">
            <button id="btnChanges" class="btn btn-changes">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              Request Changes
            </button>
            <button id="btnApprove" class="btn btn-approve">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Approve
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Gallery Panel -->
    <div id="galleryPanel" class="gallery-panel hidden">
      <div class="gallery-header">
        <h2>Screenshots</h2>
        <div class="gallery-actions">
          <input type="text" id="gallerySearch" class="search-input" placeholder="Search screenshots...">
          <button id="btnRefresh" class="btn btn-sm">Refresh</button>
        </div>
      </div>
      <div id="galleryGrid" class="gallery-grid">
        <div class="gallery-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>No screenshots yet</p>
          <p class="hint">Use the CLI to render diagrams or capture screens</p>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-backdrop" id="settingsBackdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="btnCloseSettings" class="btn btn-icon btn-close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <h3>Appearance</h3>
            <div class="setting-row">
              <label for="themeSelect">Theme</label>
              <select id="themeSelect" class="setting-select">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </div>
          </div>
          <div class="setting-group">
            <h3>Annotation Colors</h3>
            <div class="setting-row">
              <label for="colorRect">Rectangle</label>
              <input type="color" id="colorRect" class="color-input" value="#6366f1">
            </div>
            <div class="setting-row">
              <label for="colorArrow">Arrow</label>
              <input type="color" id="colorArrow" class="color-input" value="#ef4444">
            </div>
            <div class="setting-row">
              <label for="colorText">Text</label>
              <input type="color" id="colorText" class="color-input" value="#f1f5f9">
            </div>
          </div>
          <div class="setting-group">
            <h3>Capture</h3>
            <div class="setting-row">
              <label for="hotkeyInput">Global Hotkey</label>
              <input type="text" id="hotkeyInput" class="setting-input" value="Ctrl+Shift+S" placeholder="e.g. Ctrl+Shift+S">
            </div>
            <div class="setting-row">
              <label for="qualityRange">Screenshot Quality</label>
              <input type="range" id="qualityRange" class="setting-range" min="50" max="100" value="92">
              <span id="qualityValue">92%</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="btnSaveSettings" class="btn btn-approve">Save Settings</button>
          <button id="btnCancelSettings" class="btn btn-changes">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/fabric@6.5.3/dist/index.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
